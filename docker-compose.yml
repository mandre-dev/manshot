version: "3.9"

services:
  redis:
    image: redis:7-alpine
    container_name: manshot-redis
    ports:
      - "6379:6379"
    restart: unless-stopped

  api:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: manshot-api
    command: sh -c "alembic upgrade head && bash ./start.sh"
    env_file:
      - .env
    environment:
      REDIS_URL: redis://redis:6379/0
      PYTHONUNBUFFERED: "1"
      PORT: "8000"
    volumes:
      - ./:/app
    ports:
      - "8000:8000"
    depends_on:
      - redis
    restart: unless-stopped

  dashboard:
    build:
      context: ./dashboard
      dockerfile: Dockerfile
    container_name: manshot-dashboard
    environment:
      CHOKIDAR_USEPOLLING: "true"
    volumes:
      - ./dashboard:/app
      - /app/node_modules
    ports:
      - "5173:5173"
    depends_on:
      - api
    restart: unless-stopped

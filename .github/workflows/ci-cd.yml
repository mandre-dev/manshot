name: CI/CD - Manshot

on:
  pull_request:
    branches: ["main"]
  push:
    branches: ["main"]

concurrency:
  group: manshot-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend-ci:
    name: Backend CI
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Validate backend imports and syntax
        run: |
          python -m compileall api core
          python -c "from api.main import app; print(app.title)"

  frontend-ci:
    name: Frontend CI
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: dashboard

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: dashboard/package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

  deploy-render:
    name: Deploy Render
    runs-on: ubuntu-latest
    needs: [backend-ci, frontend-ci]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    env:
      RENDER_DEPLOY_HOOK_BACKEND: ${{ secrets.RENDER_DEPLOY_HOOK_BACKEND }}
      RENDER_DEPLOY_HOOK_DASHBOARD: ${{ secrets.RENDER_DEPLOY_HOOK_DASHBOARD }}

    steps:
      - name: Validate deploy hook configuration
        run: |
          if [ -z "$RENDER_DEPLOY_HOOK_BACKEND" ] && [ -z "$RENDER_DEPLOY_HOOK_DASHBOARD" ]; then
            echo "Nenhum hook de deploy configurado."
            echo "Configure ao menos um secret: RENDER_DEPLOY_HOOK_BACKEND ou RENDER_DEPLOY_HOOK_DASHBOARD"
            exit 1
          fi

      - name: Trigger backend deploy on Render
        run: |
          if [ -n "$RENDER_DEPLOY_HOOK_BACKEND" ]; then
            curl -fsS -X POST "$RENDER_DEPLOY_HOOK_BACKEND"
          else
            echo "Skipping backend deploy hook: secret not configured."
          fi

      - name: Trigger dashboard deploy on Render
        run: |
          if [ -n "$RENDER_DEPLOY_HOOK_DASHBOARD" ]; then
            curl -fsS -X POST "$RENDER_DEPLOY_HOOK_DASHBOARD"
          else
            echo "Skipping dashboard deploy hook: secret not configured."
          fi
